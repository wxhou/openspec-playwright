name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Check file size limits
        run: |
          # Enforce a max line count per file to prevent runaway files.
          # Scans our own source only; skips vendored/cached deps.
          MAX_LINES=1500
          violations=$(find . -type f \
            \( -name '*.ts' -o -name '*.tsx' -o -name '*.js' -o -name '*.mjs' \
               -o -name '*.css' -o -name '*.md' -o -name '*.html' \) \
            -not -path './node_modules/*' \
            -not -path './.opencode/*' \
            -not -path './dist/*' \
            -not -path './.git/*' \
            | xargs wc -l 2>/dev/null \
            | awk -v max="$MAX_LINES" '$1 > max && $2 != "total" { printf "%s: %d lines\n", $2, $1 }')
          if [ -n "$violations" ]; then
            echo "❌ Files exceeding $MAX_LINES lines:"
            echo "$violations"
            exit 1
          fi
          echo "✅ All files within $MAX_LINES-line limit"

      - name: Test
        run: npm run test:run

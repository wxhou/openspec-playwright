name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ─── Gate: all quality checks must pass before any release action ───
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Verify lockfile
        run: npm ci --dry-run

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm run test:run

  # ─── Publish: only runs after verify succeeds ──────────────────────
  release:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Set version from tag
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          node -e "
            import {readFileSync, writeFileSync} from 'fs';
            const pkg = JSON.parse(readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Generate release notes
        id: release-notes
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          # Get all tags sorted by version, find previous tag
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log "$PREV_TAG..HEAD" --oneline --format="- %s")
          else
            CHANGES=$(git log --oneline --format="- %s" -10)
          fi
          COMPARE_URL="https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG_NAME}"
          if [ -z "$PREV_TAG" ]; then
            COMPARE_URL="https://github.com/${{ github.repository }}/releases/tag/${TAG_NAME}"
          fi
          cat << NOTES > release-notes.md
          ## What's Changed

          ${CHANGES}

          **Full Changelog**: ${COMPARE_URL}
          NOTES
          echo "body_path=release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Package for release
        run: |
          npm pack --pack-destination .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.release-notes.outputs.body_path }}
          files: "*.tgz"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
